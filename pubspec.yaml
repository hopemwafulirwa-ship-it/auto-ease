name: auto_ease
description: A location-based platform designed to connect customers with nearby car service centers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.1.0

  # Supabase
  supabase_flutter: ^2.8.0

  # UI & Design
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2
  flutter_animate: ^4.5.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0

  # Utilities
  intl: ^0.18.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.8
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.4
  flutter_launcher_icons: ^0.13.1
  bdd_widget_test: ^1.7.6
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_icon.png"
